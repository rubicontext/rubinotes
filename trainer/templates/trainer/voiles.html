<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Réglage des voiles — Laser / ILCA</title>
<meta name="theme-color" content="#2563eb">
<link rel="manifest" href="/manifest.webmanifest">
<link rel="apple-touch-icon" href="/icon-192.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<style>
  :root {
    --ink: #1a1a2e;
    --bg: #faf8f4;
    --accent: #2563eb;
    --ok: #16a34a;
    --ko: #dc2626;
  }
  * { box-sizing: border-box; }
  body {
    font-family: Georgia, "Times New Roman", serif;
    background: var(--bg);
    color: var(--ink);
    margin: 0;
    padding: 24px 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  h1 { font-size: 1.5rem; margin: 0 0 4px; font-weight: normal; }
  .topnav { display: flex; gap: 18px; margin-bottom: 10px; font-size: .95rem; }
  .topnav a { color: var(--accent); text-decoration: none; }
  .topnav a.on { font-weight: bold; border-bottom: 2px solid var(--accent); }
  .sub { color: #666; font-size: .9rem; margin-bottom: 16px; text-align: center; }
  .card {
    background: white;
    border: 1px solid #e5e0d8;
    border-radius: 12px;
    padding: 16px 20px;
    margin-bottom: 20px;
    box-shadow: 0 1px 4px rgba(0,0,0,.05);
    max-width: 640px;
    width: 100%;
  }
  .scenario { display: flex; gap: 18px; align-items: center; flex-wrap: wrap; justify-content: center; }
  .scenario .diagram { flex: 0 0 auto; }
  .scenario .txt { flex: 1; min-width: 180px; }
  .scenario .allure { font-size: 1.35rem; font-weight: bold; }
  .scenario .wind { font-size: 1.05rem; color: #555; margin-top: 4px; }
  .scenario .wind b { color: var(--accent); }
  .params { margin-top: 4px; }
  .param { margin-bottom: 16px; }
  .param > .plabel { font-size: 1.05rem; font-weight: bold; margin-bottom: 2px; }
  .param > .phint { font-size: .8rem; color: #999; margin-bottom: 7px; }
  .opts { display: flex; gap: 8px; flex-wrap: wrap; }
  .opt {
    font-family: inherit;
    font-size: .95rem;
    padding: 9px 14px;
    border: 1px solid #ccc;
    background: white;
    color: var(--ink);
    border-radius: 20px;
    cursor: pointer;
    touch-action: manipulation;
    flex: 1;
    min-width: 90px;
    text-align: center;
  }
  .opt.sel { border-color: var(--accent); background: #eff6ff; color: var(--accent); font-weight: bold; }
  .opt.correct { border-color: var(--ok); background: #dcfce7; color: var(--ok); font-weight: bold; }
  .opt.wrong { border-color: var(--ko); background: #fee2e2; color: var(--ko); font-weight: bold; }
  .locked .opt { cursor: default; }
  .actions { display: flex; gap: 12px; margin-top: 8px; align-items: center; flex-wrap: wrap; }
  button {
    font-family: inherit;
    font-size: 1.05rem;
    padding: 10px 22px;
    border: 1px solid var(--accent);
    background: var(--accent);
    color: white;
    border-radius: 8px;
    cursor: pointer;
    touch-action: manipulation;
  }
  button:hover { opacity: .9; }
  button.secondary { background: white; color: var(--accent); }
  button:disabled { opacity: .4; cursor: default; }
  .score { margin-left: auto; font-size: .95rem; color: #666; }
  .feedback { margin-top: 14px; font-size: .95rem; line-height: 1.5; }
  .feedback.hidden { display: none; }
  .feedback .verdict { font-size: 1.1rem; font-weight: bold; margin-bottom: 6px; }
  .feedback .verdict.ok { color: var(--ok); }
  .feedback .verdict.ko { color: var(--ko); }
  .feedback .explain { color: #444; background: #f6f4ef; border-radius: 8px; padding: 10px 12px; }
  .feedback .explain b { color: var(--accent); }
  @media (max-width: 600px) {
    body { padding: 12px 8px; }
    h1 { font-size: 1.15rem; }
    .card { padding: 12px 12px; border-radius: 10px; margin-bottom: 12px; }
    .opt { min-width: 70px; font-size: .9rem; padding: 9px 8px; }
  }
</style>
</head>
<body>

<nav class="topnav"><a href="/">Lecture de notes</a><a href="/accords">Accords</a><a href="/voiles" class="on">Réglage voiles</a></nav>
<h1>Réglage des voiles — Laser / ILCA</h1>
<div class="sub">On te donne l'allure et le vent : règle les 4 paramètres comme il faut.</div>

<div class="card">
  <div class="scenario">
    <div class="diagram" id="diagram"></div>
    <div class="txt">
      <div class="allure" id="allure"></div>
      <div class="wind" id="wind"></div>
    </div>
  </div>
</div>

<div class="card">
  <div class="params" id="params"></div>
  <div class="feedback hidden" id="feedback"></div>
  <div class="actions">
    <button id="check">Valider</button>
    <button id="next" class="secondary" disabled>Suivant &rarr;</button>
    <span class="score" id="score"></span>
  </div>
</div>

<script>
// ---- Les 4 paramètres du jeu et leurs options (du + relâché au + tendu) ----
const PARAMS = [
  {key: "cunningham", label: "Cunningham (hale-bas de guindant)",
   hint: "Tend le guindant, positionne le creux — pour le vent (plis)",
   opts: ["Lâché", "Mi-tendu", "À fond"]},
  {key: "halebas", label: "Hale-bas (de bôme / vang)",
   hint: "Tension de chute + cintre le mât — empêche la bôme de monter",
   opts: ["Relâché (mou)", "Tendu (cintre)", "À fond"]},
  {key: "bordure", label: "Bordure (outhaul)",
   hint: "Creux dans le bas de la voile — plat = vitesse, creux = puissance",
   opts: ["Lâchée (creuse)", "Mi-plate", "À fond (plate)"]},
  {key: "position", label: "Position du barreur",
   hint: "D'avant en arrière + gîte selon l'allure et la force",
   opts: ["Très avancé, groupé, bas", "Rappel, avancé, buste actif",
          "Rappel max, léger recul", "Reculé, prêt à contrer la gîte",
          "Reculé, gîte au vent, anti-roulis"]},
];

// ---- Les situations (allure × vent) et le bon réglage ----
// point = orientation du bateau (degrés, 0 = face au vent qui vient du haut)
const CASES = [
  {allure: "Près", wind: "Petit temps (0–8 nœuds)", point: 45,
   answer: {cunningham: 0, halebas: 0, bordure: 0, position: 0},
   explain: "Petit temps au près : on veut une voile <b>creuse et puissante</b>. Cunningham lâché (quelques plis tolérés), hale-bas juste mou (trop = mât trop cintré = pas de puissance), bordure creuse (~10–15 cm sous la bôme). Barreur très avancé, groupé et bas, mouvements doux."},
  {allure: "Près", wind: "Médium (8–15 nœuds), allure de rappel", point: 45,
   answer: {cunningham: 1, halebas: 1, bordure: 1, position: 1},
   explain: "Près médium : le <b>hale-bas devient la clé</b> pour cintrer le mât, aplatir et ouvrir le haut dans les risées. Cunningham mi-tendu pour effacer les plis, bordure plus plate (une largeur de main). Au rappel, pieds sous les sangles, on rentre/sort le buste au rythme des risées."},
  {allure: "Près", wind: "Fort (15 nœuds et +), survie", point: 45,
   answer: {cunningham: 2, halebas: 2, bordure: 2, position: 2},
   explain: "Surpuissant → <b>tout se tend</b> pour aplatir et ouvrir. Cunningham à fond (ouvre le haut, allège la barre), hale-bas block-to-block (anti-surpuissance n°1), bordure à fond. Rappel max, buste à plat, léger recul pour dégager le nez dans le clapot, écoute jouée sans arrêt."},
  {allure: "Travers", wind: "Médium (largue / reaching)", point: 90,
   answer: {cunningham: 1, halebas: 1, bordure: 0, position: 3},
   explain: "Au travers on cherche de la puissance : <b>bordure ouverte/creuse</b>. Cunningham relâché un peu vs le près, hale-bas juste ce qu'il faut pour que la bôme ne monte pas (repère : latte sup ~parallèle à la bôme). Barreur reculé pour faire planer, prêt à basculer pour garder le bateau plat."},
  {allure: "Portant", wind: "Vent arrière", point: 170,
   answer: {cunningham: 0, halebas: 0, bordure: 0, position: 4},
   explain: "Au portant on projette la voile : <b>tout se relâche</b>. Cunningham lâché, bordure lâchée (max de surface), hale-bas relâché — mais garder un minimum de sécurité (trop lâché → bôme qui monte, vrillage, départ au lof / dessalage). Barreur reculé, gîte au vent, jambes prêtes à contrer le death roll."},
];

// ---- État ----
let idx = -1;
let selected = {};   // key -> option index
let locked = false;
let score = 0, done = 0;

const $params = document.getElementById("params");
const $feedback = document.getElementById("feedback");
const $check = document.getElementById("check");
const $next = document.getElementById("next");
const $score = document.getElementById("score");

// ---- Schéma bateau + vent (SVG vue de dessus) ----
function boatDiagram(pointDeg) {
  const svg = `
  <svg width="130" height="150" viewBox="0 0 130 150" xmlns="http://www.w3.org/2000/svg">
    <!-- vent : flèches du haut vers le bas -->
    <defs>
      <marker id="arrow" markerWidth="8" markerHeight="8" refX="4" refY="6" orient="auto">
        <path d="M0,0 L4,6 L8,0" fill="none" stroke="#94a3b8" stroke-width="1.4"/>
      </marker>
    </defs>
    <line x1="20" y1="6" x2="20" y2="30" stroke="#94a3b8" stroke-width="1.4" marker-end="url(#arrow)"/>
    <line x1="45" y1="6" x2="45" y2="30" stroke="#94a3b8" stroke-width="1.4" marker-end="url(#arrow)"/>
    <text x="60" y="20" font-size="11" fill="#94a3b8" font-family="Georgia">vent</text>
    <!-- bateau, pivote selon l'allure -->
    <g transform="translate(65,90) rotate(${pointDeg})">
      <!-- coque -->
      <path d="M0,-38 C12,-20 12,28 0,40 C-12,28 -12,-20 0,-38 Z"
            fill="#eef2f7" stroke="#334155" stroke-width="2"/>
      <!-- mât -->
      <circle cx="0" cy="-14" r="3" fill="#334155"/>
      <!-- bôme + voile (perpendiculaire ~ selon allure, on la laisse sortir côté opposé au vent) -->
      <line x1="0" y1="-14" x2="0" y2="26" stroke="#2563eb" stroke-width="2.5"/>
    </g>
  </svg>`;
  return svg;
}

function renderCase() {
  const c = CASES[idx];
  document.getElementById("allure").textContent = "⛵ " + c.allure;
  document.getElementById("wind").innerHTML = c.wind;
  document.getElementById("diagram").innerHTML = boatDiagram(c.point);

  selected = {};
  locked = false;
  $params.classList.remove("locked");
  $feedback.classList.add("hidden");
  $check.disabled = false;
  $next.disabled = true;

  $params.innerHTML = "";
  PARAMS.forEach(p => {
    const div = document.createElement("div");
    div.className = "param";
    div.dataset.key = p.key;
    div.innerHTML = `<div class="plabel">${p.label}</div><div class="phint">${p.hint}</div>`;
    const opts = document.createElement("div");
    opts.className = "opts";
    p.opts.forEach((label, i) => {
      const b = document.createElement("button");
      b.className = "opt";
      b.textContent = label;
      b.dataset.i = i;
      b.addEventListener("click", () => {
        if (locked) return;
        selected[p.key] = i;
        opts.querySelectorAll(".opt").forEach(o => o.classList.toggle("sel", +o.dataset.i === i));
      });
      opts.appendChild(b);
    });
    div.appendChild(opts);
    $params.appendChild(div);
  });
  updateScore();
}

function updateScore() {
  $score.textContent = done ? `Score : ${score}/${done}` : "";
}

function check() {
  if (Object.keys(selected).length < PARAMS.length) return;  // il faut tout renseigner
  const c = CASES[idx];
  locked = true;
  $params.classList.add("locked");
  $check.disabled = true;
  $next.disabled = false;

  let allRight = true;
  PARAMS.forEach(p => {
    const good = c.answer[p.key];
    const chosen = selected[p.key];
    if (chosen !== good) allRight = false;
    const opts = $params.querySelector(`.param[data-key="${p.key}"] .opts`);
    opts.querySelectorAll(".opt").forEach(o => {
      const i = +o.dataset.i;
      o.classList.remove("sel");
      if (i === good) o.classList.add("correct");
      else if (i === chosen) o.classList.add("wrong");
    });
  });

  done++;
  if (allRight) score++;
  updateScore();

  $feedback.classList.remove("hidden");
  $feedback.innerHTML =
    `<div class="verdict ${allRight ? "ok" : "ko"}">${allRight ? "✔ Parfait, réglage juste !" : "✘ Presque — regarde les bons réglages en vert"}</div>` +
    `<div class="explain">${c.explain}</div>`;
}

function nextCase() {
  // ordre aléatoire mais on évite de retomber sur la même
  let n;
  do { n = Math.floor(Math.random() * CASES.length); } while (CASES.length > 1 && n === idx);
  idx = n;
  renderCase();
}

$check.addEventListener("click", check);
$next.addEventListener("click", nextCase);

nextCase();

if ("serviceWorker" in navigator) navigator.serviceWorker.register("/sw.js");
</script>
</body>
</html>
