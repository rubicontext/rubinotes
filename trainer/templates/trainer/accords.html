<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Accords — progressions</title>
<meta name="theme-color" content="#2563eb">
<link rel="manifest" href="/manifest.webmanifest">
<link rel="apple-touch-icon" href="/icon-192.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<style>
  :root {
    --ink: #1a1a2e;
    --bg: #faf8f4;
    --accent: #2563eb;
  }
  * { box-sizing: border-box; }
  body {
    font-family: Georgia, "Times New Roman", serif;
    background: var(--bg);
    color: var(--ink);
    margin: 0;
    padding: 24px 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  h1 { font-size: 1.5rem; margin: 0 0 4px; font-weight: normal; }
  h2 { font-size: 1.1rem; font-weight: normal; color: #555; margin: 0 0 10px; }
  .topnav { display: flex; gap: 18px; margin-bottom: 10px; font-size: .95rem; }
  .topnav a { color: var(--accent); text-decoration: none; }
  .topnav a.on { font-weight: bold; border-bottom: 2px solid var(--accent); }
  .sub { color: #666; font-size: .9rem; margin-bottom: 16px; }
  .card {
    background: white;
    border: 1px solid #e5e0d8;
    border-radius: 12px;
    padding: 16px 20px;
    margin-bottom: 20px;
    box-shadow: 0 1px 4px rgba(0,0,0,.05);
    max-width: 820px;
    width: 100%;
    overflow-x: auto;
  }
  label { font-size: .95rem; color: #555; display: block; margin-bottom: 4px; }
  select {
    font-family: inherit;
    font-size: 1.05rem;
    padding: 10px 12px;
    border: 1px solid #ccc;
    border-radius: 8px;
    background: white;
    width: 100%;
  }
  .pickers { display: flex; gap: 16px; flex-wrap: wrap; align-items: flex-end; }
  .pickers > div { flex: 1; min-width: 140px; }
  .pickers > div.prog { flex: 2; min-width: 220px; }
  button {
    font-family: inherit;
    font-size: 1.05rem;
    padding: 10px 22px;
    border: 1px solid var(--accent);
    background: var(--accent);
    color: white;
    border-radius: 8px;
    cursor: pointer;
    touch-action: manipulation;
    white-space: nowrap;
  }
  button:hover { opacity: .9; }
  button.secondary { background: white; color: var(--accent); }
  .chord.playing { background: var(--accent); }
  .chord.playing .name { color: white; }
  .chord.playing .deg { color: #cfe0ff; }
  /* résultat */
  .result { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 16px; }
  .chord {
    background: #eff6ff;
    border: 2px solid var(--accent);
    border-radius: 10px;
    padding: 12px 0;
    text-align: center;
    flex: 1;
    min-width: 64px;
    max-width: 110px;
  }
  .chord .name { font-size: 1.5rem; font-weight: bold; color: var(--accent); }
  .chord .deg { font-size: .8rem; color: #888; margin-top: 2px; }
  /* table des tonalités */
  table { border-collapse: collapse; width: 100%; font-size: .95rem; }
  th, td { padding: 8px 10px; text-align: center; border-bottom: 1px solid #eee; }
  th { color: #888; font-weight: normal; font-size: .85rem; }
  th.deg-min, td.deg-min { color: #997a00; }
  tbody tr { cursor: pointer; }
  tbody tr:hover { background: #f0f4ff; }
  tbody tr.sel { background: #dbeafe; }
  tbody tr.sel td:first-child { font-weight: bold; }
  td:first-child { font-weight: bold; }
  .hint { font-size: .8rem; color: #999; margin-top: 8px; }
  @media (max-width: 600px) {
    body { padding: 12px 8px; }
    h1 { font-size: 1.15rem; }
    .card { padding: 12px 10px; border-radius: 10px; margin-bottom: 12px; }
    .chord .name { font-size: 1.2rem; }
    th, td { padding: 6px 5px; font-size: .85rem; }
  }
</style>
</head>
<body>

<nav class="topnav"><a href="/">Lecture de notes</a><a href="/accords" class="on">Accords</a></nav>
<h1>Générateur d'accords</h1>
<div class="sub">Choisis une tonalité et une progression</div>

<div class="card">
  <div class="pickers">
    <div>
      <label for="key">Tonalité (accord de base)</label>
      <select id="key"></select>
    </div>
    <div class="prog">
      <label for="prog">Progression</label>
      <select id="prog"></select>
    </div>
    <div style="flex: 0">
      <button id="play">&#9654; &Eacute;couter</button>
    </div>
    <div style="flex: 0">
      <button id="toggle-notation" class="secondary"></button>
    </div>
  </div>
  <div class="result" id="result"></div>
</div>

<div class="card">
  <h2>Accords associés par tonalité</h2>
  <table>
    <thead>
      <tr>
        <th>Tonalité</th><th>I</th><th class="deg-min">ii</th><th class="deg-min">iii</th>
        <th>IV</th><th>V</th><th class="deg-min">vi</th><th class="deg-min">vii°</th>
      </tr>
    </thead>
    <tbody id="keytable"></tbody>
  </table>
  <div class="hint">Majuscules = accords majeurs, minuscules = mineurs. Clique sur une ligne pour choisir la tonalité.</div>
</div>

<script>
// ---- Théorie : accords diatoniques d'une gamme majeure ----
const SHARP = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
const FLAT  = ["C","Db","D","Eb","E","F","Gb","G","Ab","A","Bb","B"];
const KEYS = ["C","G","D","A","E","F","Bb","Eb","Ab","Db","B","F#"];
const FLAT_KEYS = new Set(["F","Bb","Eb","Ab","Db"]);

// degrés diatoniques + degrés empruntés courants (rock, flamenco, grunge...)
const DEGREE_DEFS = {
  "I":    {off: 0,  suf: ""},
  "ii":   {off: 2,  suf: "m"},
  "bIII": {off: 3,  suf: ""},
  "iii":  {off: 4,  suf: "m"},
  "III":  {off: 4,  suf: ""},
  "IV":   {off: 5,  suf: ""},
  "iv":   {off: 5,  suf: "m"},
  "V":    {off: 7,  suf: ""},
  "bVI":  {off: 8,  suf: ""},
  "vi":   {off: 9,  suf: "m"},
  "bVII": {off: 10, suf: ""},
  "vii°": {off: 11, suf: "dim"},
};

function chordName(key, degree) {
  const scale = FLAT_KEYS.has(key) ? FLAT : SHARP;
  const d = DEGREE_DEFS[degree];
  return scale[(scale.indexOf(key) + d.off) % 12] + d.suf;
}

// ---- Progressions triées par genre ----
const PROGRESSIONS = [
  // Rock
  {genre: "Rock", name: "Rock classique", degrees: ["I","IV","V","IV"]},
  {genre: "Rock", name: "Rock sudiste (Sweet Home Alabama)", degrees: ["I","bVII","IV"]},
  {genre: "Rock", name: "Rock alternatif (Creep)", degrees: ["I","III","IV","iv"]},
  {genre: "Rock", name: "Grunge (Smells Like Teen Spirit)", degrees: ["I","IV","bIII","bVI"]},
  {genre: "Rock", name: "Hard rock 70s", degrees: ["I","bIII","IV","I"]},
  {genre: "Rock", name: "Punk rock", degrees: ["I","IV","V","V"]},
  {genre: "Rock", name: "Rock épique (stade)", degrees: ["I","V","vi","IV"]},
  // Pop
  {genre: "Pop", name: "Pop universelle (Let It Be)", degrees: ["I","V","vi","IV"]},
  {genre: "Pop", name: "Pop mélancolique", degrees: ["vi","IV","I","V"]},
  {genre: "Pop", name: "Doo-wop 50s (Stand By Me)", degrees: ["I","vi","IV","V"]},
  {genre: "Pop", name: "Pop 80s", degrees: ["I","iii","IV","V"]},
  {genre: "Pop", name: "Ballade pop", degrees: ["I","IV","vi","V"]},
  {genre: "Pop", name: "Canon de Pachelbel", degrees: ["I","V","vi","iii","IV","I","IV","V"]},
  // Folk / Country
  {genre: "Folk / Country", name: "Folk trois accords", degrees: ["I","IV","I","V"]},
  {genre: "Folk / Country", name: "Country classique", degrees: ["I","IV","V","I"]},
  {genre: "Folk / Country", name: "Ballade folk (Knockin' on Heaven's Door)", degrees: ["I","V","ii","I","V","IV"]},
  {genre: "Folk / Country", name: "Folk celtique", degrees: ["I","bVII","IV","I"]},
  // Blues
  {genre: "Blues", name: "Blues 12 mesures", degrees: ["I","I","I","I","IV","IV","I","I","V","IV","I","V"]},
  {genre: "Blues", name: "Blues quick change", degrees: ["I","IV","I","I","IV","IV","I","I","V","IV","I","V"]},
  {genre: "Blues", name: "Blues mineur", degrees: ["vi","ii","vi","III"]},
  // Jazz
  {genre: "Jazz", name: "Cadence ii-V-I", degrees: ["ii","V","I"]},
  {genre: "Jazz", name: "Anatole", degrees: ["I","vi","ii","V"]},
  {genre: "Jazz", name: "Turnaround", degrees: ["iii","vi","ii","V"]},
  {genre: "Jazz", name: "Minor swing (manouche)", degrees: ["vi","ii","III","vi"]},
  // Reggae / Ska
  {genre: "Reggae / Ska", name: "Reggae roots (No Woman No Cry)", degrees: ["I","V","vi","IV"]},
  {genre: "Reggae / Ska", name: "Reggae deux accords", degrees: ["I","V","I","V"]},
  {genre: "Reggae / Ska", name: "Reggae mineur", degrees: ["vi","V","IV","V"]},
  {genre: "Reggae / Ska", name: "Ska", degrees: ["I","ii","IV","V"]},
  // Rap / Hip-hop
  {genre: "Rap / Hip-hop", name: "Boom bap", degrees: ["vi","IV","vi","V"]},
  {genre: "Rap / Hip-hop", name: "G-funk west coast", degrees: ["vi","V","vi","V"]},
  {genre: "Rap / Hip-hop", name: "Trap (boucle 2 accords)", degrees: ["vi","vi","IV","IV"]},
  {genre: "Rap / Hip-hop", name: "Lo-fi chill", degrees: ["ii","V","I","vi"]},
  // Soul / R&B / Funk
  {genre: "Soul / R&B / Funk", name: "Soul Motown", degrees: ["I","iii","vi","V"]},
  {genre: "Soul / R&B / Funk", name: "R&B descendant", degrees: ["IV","iii","ii","I"]},
  {genre: "Soul / R&B / Funk", name: "Funk (vamp 2 accords)", degrees: ["I","IV","I","IV"]},
  // Latin / Flamenco
  {genre: "Latin / Flamenco", name: "Cadence andalouse", degrees: ["vi","V","IV","III"]},
  {genre: "Latin / Flamenco", name: "Bossa nova", degrees: ["I","ii","V","I"]},
  {genre: "Latin / Flamenco", name: "Latin mineur (Oye Como Va)", degrees: ["vi","ii","vi","ii"]},
  // Chanson / Émotion
  {genre: "Chanson / Émotion", name: "Chanson française (valse)", degrees: ["vi","III","vi","III"]},
  {genre: "Chanson / Émotion", name: "Hallelujah", degrees: ["I","vi","I","vi","IV","V","I","V"]},
];

// ---- Notation FR / EN (partagée avec la page notes via localStorage) ----
let notation = localStorage.getItem("notation") || "fr";
const EN2FR = {C: "Do", D: "Ré", E: "Mi", F: "Fa", G: "Sol", A: "La", B: "Si"};

function dispChord(name) {
  if (notation === "en") return name;
  return name.replace(/^[A-G][#b]?/, m => EN2FR[m[0]] + (m[1] || ""));
}

const keySel = document.getElementById("key");
const progSel = document.getElementById("prog");

function fillKeySelect() {
  const cur = keySel.value;
  keySel.innerHTML = "";
  KEYS.forEach(k => {
    const o = document.createElement("option");
    o.value = k; o.textContent = dispChord(k);
    keySel.appendChild(o);
  });
  if (cur) keySel.value = cur;
}
fillKeySelect();

// progressions groupées par genre (optgroup)
{
  const byGenre = {};
  PROGRESSIONS.forEach((p, i) => { (byGenre[p.genre] = byGenre[p.genre] || []).push({p, i}); });
  for (const genre of Object.keys(byGenre)) {
    const og = document.createElement("optgroup");
    og.label = genre;
    byGenre[genre].forEach(({p, i}) => {
      const o = document.createElement("option");
      o.value = i;
      o.textContent = p.degrees.length > 8 ? p.name : `${p.name} — ${p.degrees.join(" ")}`;
      og.appendChild(o);
    });
    progSel.appendChild(og);
  }
}

function render() {
  if (window.__stopPlayback) window.__stopPlayback();  // stoppe l'audio si on change pendant la lecture
  const key = keySel.value;
  const prog = PROGRESSIONS[+progSel.value];
  // cartes d'accords
  const res = document.getElementById("result");
  res.innerHTML = "";
  prog.degrees.forEach(deg => {
    const div = document.createElement("div");
    div.className = "chord";
    div.innerHTML = `<div class="name">${dispChord(chordName(key, deg))}</div><div class="deg">${deg}</div>`;
    res.appendChild(div);
  });
  // table : ligne sélectionnée
  document.querySelectorAll("#keytable tr").forEach(tr =>
    tr.classList.toggle("sel", tr.dataset.key === key));
}

// table des tonalités
const tbody = document.getElementById("keytable");
const TABLE_DEGREES = ["I","ii","iii","IV","V","vi","vii°"];
function buildTable() {
  tbody.innerHTML = "";
  KEYS.forEach(k => {
    const tr = document.createElement("tr");
    tr.dataset.key = k;
    tr.innerHTML = "<td>" + dispChord(k) + "</td>" +
      TABLE_DEGREES.map(d =>
        `<td${DEGREE_DEFS[d].suf ? ' class="deg-min"' : ''}>${dispChord(chordName(k, d))}</td>`).join("");
    tr.addEventListener("click", () => { keySel.value = k; render(); });
    tbody.appendChild(tr);
  });
}
buildTable();

// toggle notation FR / EN
function updateNotationButton() {
  document.getElementById("toggle-notation").textContent =
    notation === "fr" ? "Notation : Do Ré Mi" : "Notation : C D E";
}
document.getElementById("toggle-notation").addEventListener("click", () => {
  notation = notation === "fr" ? "en" : "fr";
  localStorage.setItem("notation", notation);
  updateNotationButton();
  fillKeySelect();
  buildTable();
  render();
});
updateNotationButton();

keySel.addEventListener("change", render);
progSel.addEventListener("change", render);
render();

// ---- Preview audio (Web Audio API, son type corde pincée) ----
const CHORD_SEC = 1.3;          // durée de chaque accord
let audioCtx = null, stopFns = [], isPlaying = false;

function chordMidis(key, degree) {
  const scale = FLAT_KEYS.has(key) ? FLAT : SHARP;
  const d = DEGREE_DEFS[degree];
  const root = 48 + (scale.indexOf(key) + d.off) % 12;   // registre C3-B3, proche guitare
  const third = d.suf === "" ? 4 : 3;
  const fifth = d.suf === "dim" ? 6 : 7;
  return [root - 12, root, root + third, root + fifth, root + 12];
}

function playChordAt(midis, when) {
  midis.forEach((m, i) => {
    const t = when + i * 0.045;                          // léger strum grave → aigu
    const o = audioCtx.createOscillator();
    o.type = "triangle";
    o.frequency.value = 440 * Math.pow(2, (m - 69) / 12);
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(m < 48 ? 0.10 : 0.14, t + 0.015);
    g.gain.exponentialRampToValueAtTime(0.001, t + CHORD_SEC);
    o.connect(g).connect(audioCtx.destination);
    o.start(t);
    o.stop(t + CHORD_SEC + 0.05);
    stopFns.push(() => { try { o.stop(); } catch (e) {} });
  });
}

function stopPlayback() {
  stopFns.forEach(f => f());
  stopFns = [];
  isPlaying = false;
  document.getElementById("play").innerHTML = "&#9654; Écouter";
  document.querySelectorAll(".chord.playing").forEach(c => c.classList.remove("playing"));
}
window.__stopPlayback = stopPlayback;

document.getElementById("play").addEventListener("click", () => {
  if (isPlaying) { stopPlayback(); return; }
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  audioCtx.resume();
  isPlaying = true;
  document.getElementById("play").innerHTML = "&#9632; Stop";

  const key = keySel.value;
  const prog = PROGRESSIONS[+progSel.value];
  const cards = document.querySelectorAll(".chord");
  const t0 = audioCtx.currentTime + 0.05;

  prog.degrees.forEach((deg, i) => {
    playChordAt(chordMidis(key, deg), t0 + i * CHORD_SEC);
    const hl = setTimeout(() => {
      cards.forEach(c => c.classList.remove("playing"));
      if (cards[i]) cards[i].classList.add("playing");
    }, (t0 - audioCtx.currentTime + i * CHORD_SEC) * 1000);
    stopFns.push(() => clearTimeout(hl));
  });
  const end = setTimeout(stopPlayback, (t0 - audioCtx.currentTime + prog.degrees.length * CHORD_SEC) * 1000 + 200);
  stopFns.push(() => clearTimeout(end));
});

if ("serviceWorker" in navigator) navigator.serviceWorker.register("/sw.js");
</script>
</body>
</html>
